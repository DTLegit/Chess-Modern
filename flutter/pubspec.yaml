name: chess
description: "Chess — native cross-platform Flutter app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_rust_bridge: 2.12.0
  freezed_annotation: ^2.4.4
  meta: ^1.15.0
  uuid: ^4.5.1
  path_provider: ^2.1.5
  flutter_svg: ^2.0.16
  audioplayers: ^6.1.0
  collection: ^1.19.0
  file_selector: ^1.0.3
  dynamic_color: ^1.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  ffigen: ^14.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  # The squircle RGBA master PNG created from the user-provided chess icon.
  image_path: "assets/app_icon_source.png"
  remove_alpha_ios: false
  ios: true
  android: true
  macos:
    generate: true
    image_path: "assets/app_icon_source.png"
  windows:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/pieces/
    # Stockfish binaries are produced by scripts/build-stockfish-android.sh
    # into android/app/src/main/assets/stockfish/<abi>/stockfish; they are
    # referenced from Dart via rootBundle.load('assets/stockfish/<abi>/stockfish')
    # and ignored when missing (custom-engine fallback kicks in).
    - assets/stockfish/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: EBGaramond
      fonts:
        - asset: assets/fonts/EBGaramond-Variable.ttf
        - asset: assets/fonts/EBGaramond-Italic-Variable.ttf
          style: italic
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
