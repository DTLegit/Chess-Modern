name: chess
description: "Chess — native cross-platform Flutter app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_rust_bridge: 2.12.0
  freezed_annotation: ^2.4.4
  meta: ^1.15.0
  uuid: ^4.5.1
  path_provider: ^2.1.5
  flutter_svg: ^2.0.16
  audioplayers: ^6.1.0
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  ffigen: ^14.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/pieces/
