name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust workspace tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace
        run: cargo test --workspace --all-targets

  flutter:
    name: Flutter analyze + tests
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
      - name: flutter pub get
        working-directory: flutter
        run: flutter pub get
      - name: flutter analyze
        working-directory: flutter
        run: flutter analyze
      - name: flutter test
        working-directory: flutter
        run: flutter test

  desktop-build:
    name: Desktop build smoke (linux)
    runs-on: ubuntu-latest
    needs: [rust, flutter]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build clang libgtk-3-dev pkg-config
          flutter config --enable-linux-desktop
      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen
      - name: Regenerate bindings
        run: flutter_rust_bridge_codegen generate
      - name: flutter build linux
        working-directory: flutter
        run: flutter build linux --release || true   # smoke build — soft fail until native lib build is plumbed into flutter
